<!DOCTYPE html>
<html>

<head>
  <style>
    html,
    body,
    #map {
      padding: 0;
      margin: 0;
      width: 100%;
      height: 100%;
    }
  </style>
  <!-- Load MapLibre GL JS from CDN -->
  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet">
  <!-- Load MapLibre ArcGIS from CDN -->
  <script src="https://unpkg.com/@esri/maplibre-arcgis@1.1.0/dist/umd/maplibre-arcgis.min.js"></script>
</head>

<body>
  <div id="map"></div>
  <script src="./apikey.js"></script>
  <script type="module">

    const apiKey = myApiKey;

    const map = new maplibregl.Map({
      container: "map", // the id of the div element
      zoom: 13, // starting zoom
      center: [-118.498, 34.014], // starting location [longitude, latitude]
    });
    const basemapStyle = maplibreArcGIS.BasemapStyle.applyStyle(map, {
      style: 'arcgis/light-gray',
      token: apiKey
    });

    map.on('load', async () => {
      const vectorLayer = await maplibreArcGIS.VectorTileLayer.fromPortalItem('f0298e881b5b4743bbdf2c7d378acc84');
      vectorLayer.addSourcesTo(map);
      map.addLayer({
        ...vectorLayer.layer, // The layer property is a preformatted maplibre layer, including a layer ID, source, source-layer, and paint/layout information.
        type: 'fill',
        paint: { // Override paint properties provided by service
          "fill-color": ['case',
            ['==', ['get', 'UseType'], 'Residential'], '#E8E191', // Yellow
            ['==', ['get', 'UseType'], 'Commercial'], '#E580A2', // Red
            ['==', ['get', 'UseType'], 'Government'], '#79E284', // Green
            ['==', ['get', 'UseType'], 'Industrial'], '#C080E5', // Purple
            ['==', ['get', 'UseType'], 'Institutional'], '#80BBE5', // Blue
            '#bfbfbf'
          ]
        }
      });

      map.addLayer({
        ...vectorLayer.layer,
        id: 'custom-outline', // All Layer IDs must be unique
        type: 'line',
        paint: {
          'line-color': '#000000',
          'line-width': 0.25,
          'line-opacity': 0.25
        }
      });
    });
    // Service URLs are also supported with VectorTileLayer.fromUrl
    // https://vectortileservices3.arcgis.com/GVgbJbqm8hXASVYi/arcgis/rest/services/Santa_Monica_Mountains_Parcels_VTL/VectorTileServer/
  </script>
</body>

</html>
